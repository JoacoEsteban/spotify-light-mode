[tasks.generate-spotify-light-css]
description = "Generate light-mode overrides from Spotify snapshot CSS"
run = "bun scripts/generate-spotify-light-css.ts"

[tasks.process-icons]
description = "Resize icon to all extension sizes with rounded corners (usage: mise run process-icons <icon> <radius-ratio>)"
run = "fish scripts/process-icons.fish {{arg(name='icon')}} {{arg(name='radius-ratio')}}"

[tasks.screenshot]
description = "Take store screenshots for the current version of the extension"
run = "bun scripts/screenshot.ts"

[tasks.bundle]
description = "Bundle all targets"
run = "bun zip && bun run zip:firefox"
